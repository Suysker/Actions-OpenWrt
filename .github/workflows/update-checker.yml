#
# https://github.com/P3TERX/Actions-OpenWrt
#
# File: .github/workflows/update-checker.yml
# Description: Source code update checker
#

name: Update Checker

on:
  workflow_dispatch:
  schedule:
    - cron: 0 */18 * * *

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - x86
          - r4s

    steps:
    - name: Checkout
      uses: actions/checkout@main

    - name: Generate source fingerprint
      id: sources
      shell: bash
      run: |
        set -euo pipefail

        profile="${{ matrix.profile }}"
        source "profiles/${profile}/profile.env"

        mkdir -p ".source-state/${profile}"
        sources_file=".source-state/${profile}/sources.txt"
        : > "$sources_file"

        record_ref() {
          local repo="$1"
          local ref="${2:-HEAD}"
          local label="${3:-$repo}"
          local resolved_ref="$ref"
          local sha=""
          local output=""

          if [ "$ref" = "HEAD" ]; then
            output="$(git ls-remote --symref "$repo" HEAD)"
            resolved_ref="$(printf '%s\n' "$output" | awk '/^ref:/ { print $2; exit }')"
            sha="$(printf '%s\n' "$output" | awk '$2 == "HEAD" { print $1; exit }')"
          else
            sha="$(git ls-remote "$repo" "$ref" | awk 'NR == 1 { print $1 }')"
          fi

          if [ -z "$sha" ]; then
            echo "::error::Cannot resolve $repo $ref"
            exit 1
          fi

          printf '%s %s %s %s\n' "$label" "$repo" "${resolved_ref:-$ref}" "$sha" | tee -a "$sources_file"
        }

        case "$BOOTSTRAP_KIND" in
          git)
            record_ref "$REPO_URL" "refs/heads/$REPO_BRANCH" "openwrt:${profile}"
            ;;
          r4s_script)
            record_ref "$R4S_SCRIPT_REPO" "refs/heads/$R4S_SCRIPT_REF" "r4s-script"
            release_version="$(curl -fsSL "$R4S_RELEASE_TAG_URL" | tr -d '[:space:]')"
            release_tag="v${release_version#v}"
            printf '%s %s %s\n' "r4s-release" "$R4S_RELEASE_TAG_URL" "$release_tag" | tee -a "$sources_file"
            record_ref "https://github.com/openwrt/openwrt.git" "refs/tags/$release_tag" "openwrt:$release_tag"
            ;;
          *)
            echo "::error::Unknown bootstrap kind: $BOOTSTRAP_KIND"
            exit 2
            ;;
        esac

        while read -r label repo ref; do
          [ -z "${label:-}" ] && continue
          record_ref "$repo" "${ref:-HEAD}" "$label"
        done < <(bash "$GITHUB_WORKSPACE/scripts/sync-official-golang.sh" refs)

        while read -r feed repo ref; do
          [ -z "${feed:-}" ] && continue
          record_ref "$repo" "${ref:-HEAD}" "feed:$feed"
        done < <(bash "$GITHUB_WORKSPACE/scripts/manage-custom-feeds.sh" refs "$GITHUB_WORKSPACE/feeds.custom.conf")

        {
          sha256sum \
            "profiles/common/config.seed" \
            "profiles/common/forbidden-packages.txt" \
            "profiles/${profile}/config.seed" \
            "profiles/${profile}/forbidden-packages.txt" \
            "profiles/${profile}/profile.env"
        } | sha256sum | awk -v profile="$profile" '{ print "profile-files " profile " " $1 }' | tee -a "$sources_file"

        fingerprint="$(sha256sum "$sources_file" | awk '{ print $1 }')"
        echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"
        echo "sources_file=$sources_file" >> "$GITHUB_OUTPUT"

    - name: Compare source fingerprint
      id: cacheHash
      uses: actions/cache@v4
      with:
        path: .source-state/${{ matrix.profile }}
        key: source_${{ matrix.profile }}_${{ steps.sources.outputs.fingerprint }}

    - name: Show changed source fingerprint
      if: steps.cacheHash.outputs.cache-hit != 'true'
      run: cat "${{ steps.sources.outputs.sources_file }}"

    - name: Trigger build
      if: steps.cacheHash.outputs.cache-hit != 'true'
      uses: peter-evans/repository-dispatch@v3
      with:
        token: ${{ github.token }}
        event-type: Source Code Update
        client-payload: '{"profile":"${{ matrix.profile }}"}'

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 0
        keep_minimum_runs: 2
